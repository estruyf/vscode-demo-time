<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Draw a simple architecture diagram -->
  
  <!-- API Gateway -->
  <rect x="350" y="50" width="100" height="60" 
        fill="lightblue" stroke="black" stroke-width="2"/>
  <text x="400" y="85" text-anchor="middle" font-family="Arial" font-size="14">API Gateway</text>
  
  <!--speed:0.5-->
  
  <!-- Microservices layer -->
  <rect x="50" y="200" width="120" height="60" 
        fill="lightgreen" stroke="black" stroke-width="2"/>
  <text x="110" y="235" text-anchor="middle" font-family="Arial" font-size="12">Auth Service</text>
  
  <rect x="230" y="200" width="120" height="60" 
        fill="lightgreen" stroke="black" stroke-width="2"/>
  <text x="290" y="235" text-anchor="middle" font-family="Arial" font-size="12">User Service</text>
  
  <rect x="410" y="200" width="120" height="60" 
        fill="lightgreen" stroke="black" stroke-width="2"/>
  <text x="470" y="235" text-anchor="middle" font-family="Arial" font-size="12">Order Service</text>
  
  <rect x="590" y="200" width="120" height="60" 
        fill="lightgreen" stroke="black" stroke-width="2"/>
  <text x="650" y="235" text-anchor="middle" font-family="Arial" font-size="12">Payment Service</text>
  
  <!--pause:untilPlay-->
  
  <!--speed:1.0-->
  
  <!-- Database layer -->
  <ellipse cx="100" cy="400" rx="60" ry="40" 
           fill="lightyellow" stroke="black" stroke-width="2"/>
  <text x="100" y="405" text-anchor="middle" font-family="Arial" font-size="12">PostgreSQL</text>
  
  <ellipse cx="450" cy="400" rx="60" ry="40" 
           fill="lightyellow" stroke="black" stroke-width="2"/>
  <text x="450" y="405" text-anchor="middle" font-family="Arial" font-size="12">MongoDB</text>
  
  <!-- Connections -->
  <path d="M 400 110 L 110 200" stroke="gray" stroke-width="1.5" fill="none"/>
  <path d="M 400 110 L 290 200" stroke="gray" stroke-width="1.5" fill="none"/>
  <path d="M 400 110 L 470 200" stroke="gray" stroke-width="1.5" fill="none"/>
  <path d="M 400 110 L 650 200" stroke="gray" stroke-width="1.5" fill="none"/>
  
  <path d="M 110 260 L 100 360" stroke="gray" stroke-width="1.5" fill="none"/>
  <path d="M 290 260 L 100 360" stroke="gray" stroke-width="1.5" fill="none"/>
  <path d="M 470 260 L 450 360" stroke="gray" stroke-width="1.5" fill="none"/>
  <path d="M 650 260 L 450 360" stroke="gray" stroke-width="1.5" fill="none"/>
</svg>
